# 日报 — 用户兴趣配置模板
# 首次使用 /daily 时根据用户选择自动生成
# 用户可随时手动编辑，下次运行即生效

# ━━ 角色 ━━
# 影响摘要的解读角度和行动建议的方向
# 由初始化向导根据用户领域自动推断，也可手动填写
role: ""

# 角色补充描述（可选，帮助更精准解读）
# 示例："负责供应链数字化转型，关注物流优化和智能仓储"
role_context: ""

# ━━ 关注话题 ━━
# priority: high（必选）| medium（有则采）| low（偶尔看看）
# 由初始化向导根据对话内容自动生成，也可手动编辑
topics: []
  # - name: "话题名称"
  #   priority: high
  #   keywords:
  #     - "关键词1"
  #     - "关键词2"
  #     - "关键词3"

# 不感兴趣的话题（采集时排除）
exclude_topics: []
  # - "不感兴趣的话题1"
  # - "不感兴趣的话题2"

# ━━ 日报偏好 ━━
daily:
  max_items: 15              # 速览:10 | 标准:15 | 深度:20
  summary_style: "detailed"  # brief | detailed | deep
  include_actions: true      # 是否生成行动建议
  include_trends: true       # 是否生成趋势雷达
  language: "zh-CN"          # 输出语言

# ━━ 反馈服务 ━━
server:
  host: "0.0.0.0"            # 监听地址：127.0.0.1 仅本机 | 0.0.0.0 允许局域网访问
  timeout_hours: 2           # 自动停止时间（小时）
  port: 17890                # 起始端口（冲突自动 +1）

# ━━ 信息来源（由初始化向导自动探索填入）━━
sources:
  direct: []                 # 直达来源页（官方博客、changelog、社区页等）
    # - "https://example.com/blog"
  search_seeds: []           # 采集阶段复用的种子搜索词
    # - "领域关键词 最新进展"
